# tinywl — runtime key / axis bindings (no recompile)
# Syntax: binds=MODIFIERS,KEYSYM,action,arg
#         axisbind=MODIFIERS,vertical|horizontal,scroll_viewport,STEP

binds=ALT,Escape,quit,
binds=ALT,F1,cycle_focus,
binds=SUPER+SHIFT,F,set_layout,float
binds=SUPER+SHIFT,S,set_layout,scroller
axisbind=NONE,vertical,scroll_viewport,40
